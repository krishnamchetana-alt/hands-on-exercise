# Setup an in-memory database named "testdb"
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tells Hibernate to automatically build the database tables matching your User entity
spring.jpa.hibernate.ddl-auto=update

# Optional: Prints out raw SQL statements in your console so you can see Hibernate working
spring.jpa.show-sql=true